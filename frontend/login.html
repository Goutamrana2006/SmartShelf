<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartShelf Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="auth-container">

    <h1>📚 SmartShelf Login</h1>

    <form id="loginForm">

        <input
            type="email"
            id="email"
            placeholder="Enter Email"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p id="message"></p>

</div>

<script src="login.js"></script>

</body>
</html>
