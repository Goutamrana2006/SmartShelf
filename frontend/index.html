<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SmartShelf Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>📚 SmartShelf Dashboard</h1>

        <button onclick="logout()" class="logout-btn">
            🚪 Logout
        </button>

        <!-- Dashboard Cards -->

        <div class="cards">

            <div class="card">

                <h3>Total Products</h3>

                <p id="totalProducts">0</p>

            </div>

            <div class="card">

                <h3>Total Stock</h3>

                <p id="totalStock">0</p>

            </div>

            <div class="card warning">

                <h3>Low Stock</h3>

                <p id="lowStock">0</p>

            </div>

            <div class="card">

                <h3>Categories</h3>

                <p id="totalCategories">0</p>

            </div>

        </div>

        <!-- Product Section -->

        <h2>📦 Products</h2>

        <table>

            <thead>

                <tr>

                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Status</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="productTable">

            </tbody>

        </table>

    </div>

    <script src="script.js"></script>

</body>

</html>
