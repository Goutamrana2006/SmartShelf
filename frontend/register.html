<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartShelf Register</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="auth-container">

<h1>📝 Register</h1>

<form id="registerForm">

<input
type="text"
id="name"
placeholder="Enter Name"
required>

<input
type="email"
id="email"
placeholder="Enter Email"
required>

<input
type="password"
id="password"
placeholder="Enter Password"
required>

<button type="submit">
Register
</button>

</form>

<p id="message"></p>

</div>

<script src="register.js"></script>

</body>
</html>
