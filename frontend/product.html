<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="auth-container">

<h1>📦 Add Product</h1>

<form id="productForm">

<input
type="text"
id="productName"
placeholder="Product Name"
required>

<input
type="text"
id="category"
placeholder="Category"
required>

<input
type="number"
id="price"
placeholder="Price"
required>

<input
type="number"
id="quantity"
placeholder="Quantity"
required>

<input
type="number"
id="threshold"
placeholder="Low Stock Threshold"
required>

<button type="submit">
Add Product
</button>

</form>

<p id="message"></p>

</div>

<script src="product.js"></script>

</body>
</html>
